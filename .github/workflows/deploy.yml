name: Deploy — Create AWS Infrastructure

# This pipeline will use Terraform to provision AWS infrastructure.
# It will be triggered automatically when infrastructure code changes are
# pushed to main, or manually via the GitHub Actions UI.
#
# Prerequisites (to be set up before enabling):
#   - Terraform files in an infrastructure/ directory
#   - GitHub Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   - S3 backend bucket for Terraform state

on:
  # Uncomment the triggers below once infrastructure/ code is ready
  # push:
  #   branches: [main]
  #   paths: ['infrastructure/**']
  # pull_request:
  #   branches: [main]
  #   paths: ['infrastructure/**']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  TF_WORKING_DIR: infrastructure

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve
