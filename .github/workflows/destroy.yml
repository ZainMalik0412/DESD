name: Destroy — Tear Down AWS Infrastructure

# This pipeline will use Terraform to destroy all AWS infrastructure.
# It can ONLY be triggered manually from the GitHub Actions UI and
# Prerequisites 
#   - Terraform files in an infrastructure/ directory
#   - GitHub Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   - Existing Terraform state from a previous deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm infrastructure teardown'
        required: true
        type: string

env:
  AWS_REGION: eu-west-2
  TF_WORKING_DIR: infrastructure

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Confirm destruction
        run: echo "All AWS infrastructure has been successfully destroyed."
