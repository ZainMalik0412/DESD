name: Destroy Infrastructure

# Tears down ALL AWS infrastructure. Manual trigger only.
# Uses OIDC — no long-lived AWS credentials.
#
# WARNING: This will destroy everything including the database.
# ALB + WAF cost money even idle — use this when done.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm infrastructure teardown'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  TF_WORKING_DIR: infrastructure
  ECS_CLUSTER: brfnapp-cluster
  ECS_SERVICE: brfnapp-web

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Scale down ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --desired-count 0 2>/dev/null || true
          echo "Scaled down ECS service to 0 tasks"
          sleep 30

      - name: Force unlock Terraform state if locked
        run: |
          aws dynamodb delete-item --table-name brfnapp-terraform-lock \
            --key '{"LockID":{"S":"brfnapp-terraform-state/ecs/terraform.tfstate"}}' 2>/dev/null || true
          echo "Cleared any stale state locks"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -auto-approve -parallelism=20

      - name: Clean up ECR images
        run: |
          IMAGES=$(aws ecr list-images --repository-name brfnapp/web --query 'imageIds[*]' --output json 2>/dev/null || echo "[]")
          if [ "$IMAGES" != "[]" ] && [ -n "$IMAGES" ]; then
            aws ecr batch-delete-image --repository-name brfnapp/web --image-ids "$IMAGES" 2>/dev/null || true
          fi
          echo "ECR images cleaned up"

      - name: Destruction summary
        run: |
          echo "## Infrastructure Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All AWS resources have been torn down." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To also remove the Terraform state backend (S3 + DynamoDB), run locally:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "aws s3 rb s3://brfnapp-terraform-state --force" >> $GITHUB_STEP_SUMMARY
          echo "aws dynamodb delete-table --table-name brfnapp-terraform-lock" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
