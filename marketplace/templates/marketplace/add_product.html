<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product – BRFN</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; color: #333; background: #fafaf7; }
        header { background: #4a7c59; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.2rem; }
        header nav { display: flex; align-items: center; gap: 1rem; }
        header nav a { color: white; text-decoration: none; }
        .user-menu { position: relative; }
        .user-badge { background: rgba(255,255,255,0.2); padding: 0.3rem 0.8rem; border-radius: 4px; font-size: 0.85rem; cursor: pointer; }
        .user-dropdown { display: none; position: absolute; right: 0; top: 100%; margin-top: 0.4rem; background: white; border: 1px solid #ddd; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); min-width: 120px; z-index: 10; }
        .user-dropdown a { display: block; padding: 0.5rem 1rem; color: #333 !important; text-decoration: none; font-size: 0.85rem; }
        .user-dropdown a:hover { background: #f0f0ea; }
        .user-menu.open .user-dropdown { display: block; }
        .page { padding: 2rem; max-width: 500px; margin: 0 auto; }
        h2 { margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.9rem; margin-bottom: 0.3rem; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
        textarea { height: 80px; resize: vertical; }
        button { width: 100%; padding: 0.6rem; background: #4a7c59; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
        .error { background: #fee; color: #c00; padding: 0.6rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.9rem; }
        .success { background: #efe; color: #060; padding: 0.6rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.9rem; }
        .row { display: flex; gap: 1rem; }
        .row .form-group { flex: 1; }
        footer { text-align: center; padding: 1rem; font-size: 0.85rem; color: #999; border-top: 1px solid #eee; margin-top: 3rem; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/" style="color:white;text-decoration:none;">Bristol Regional Food Network</a></h1>
        <nav>
            <a href="/browse/">Browse</a>
            <a href="/browse/producers/">Producers</a>
            <a href="/browse/add-product/">Add Product</a>
            <div class="user-menu" onclick="this.classList.toggle('open')">
                <span class="user-badge">{{ user.username }} ({{ user.role }})</span>
                <div class="user-dropdown">
                    <a href="/accounts/logout/">Log Out</a>
                </div>
            </div>
        </nav>
    </header>
    <div class="page">
        <h2>Add New Product</h2>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        {% if success %}<p class="success">{{ success }}</p>{% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Product Name *</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description"></textarea>
            </div>
            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" name="category" required>
                    <option value="">Select a category</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="row">
                <div class="form-group">
                    <label for="price">Price (£) *</label>
                    <input type="number" id="price" name="price" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="unit">Unit</label>
                    <select id="unit" name="unit">
                        {% for value, label in units %}
                            <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="stock_quantity">Stock Quantity</label>
                <input type="number" id="stock_quantity" name="stock_quantity" min="0" value="0">
            </div>
            <button type="submit">Add Product</button>
        </form>
    </div>
    <footer>&copy; 2026 Bristol Regional Food Network</footer>
</body>
</html>
